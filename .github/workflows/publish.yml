name: Publish nexus-admin-core

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm test
      - name: Build
        run: npx --package=@vitejs/plugin-vue@6.0.7 --package=vite@8.0.16 -c "cd packages/core && vite build"
      - run: npm publish -w nexus-admin-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
