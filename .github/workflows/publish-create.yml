name: Publish create-nexus-admin

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'packages/create-nexus-admin/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm publish -w create-nexus-admin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}